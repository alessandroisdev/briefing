services:
  app:
    build:
      context: .docker/php
      dockerfile: Dockerfile
    image: briefing-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./www:/var/www/html
    networks:
      - briefing-network
    depends_on:
      - db
      - redis

  worker:
    build:
      context: .docker/php
      dockerfile: Dockerfile
    image: briefing-app
    restart: unless-stopped
    working_dir: /var/www/html
    command: php worker.php
    volumes:
      - ./www:/var/www/html
    networks:
      - briefing-network
    depends_on:
      - app
      - db
      - redis

  webserver:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./www:/var/www/html
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - briefing-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: briefing_app
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_USER: briefing
    ports:
      - "33060:3306"
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - briefing-network

  redis:
    image: redis:alpine
    restart: unless-stopped
    ports:
      - "63790:6379"
    volumes:
      - redis-data:/data
    networks:
      - briefing-network

networks:
  briefing-network:
    driver: bridge

volumes:
  db-data:
  redis-data:
