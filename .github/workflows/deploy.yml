name: Briefing (Produção via SSH)

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Clonar Repositório
        uses: actions/checkout@v4

      - name: 🧹 Limpeza Local (Ignorando lixo antes da cópia)
        run: |
          rm -rf .git .github .dev www/tests www/node_modules

      - name: 🚀 Copiar Arquivos via SCP para a HostGator
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          # port: ${{ secrets.SSH_PORT }} # Descomente se for diferente de 22 (HostGator geralmente é 2222)
          source: "./www/*"
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 1

      - name: ⚙️ Executar Composer e Migrations no Servidor
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          # port: ${{ secrets.SSH_PORT }} # HostGator geralmente é 2222
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            
            echo "📦 Instalando Dependências do PHP..."
            # O sistema Hostgator pode precisar do caminho explícito do php, ex: /opt/cpanel/ea-php82/root/usr/bin/php
            composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist
            
            echo "🔍 Verificando Integridade (Requirements)..."
            composer check-platform-reqs
            
            echo "🗄️ Executando Migrations Pendentes (Banco de Dados)..."
            php nortedev db:migrate --env=production
            # Ou, de forma nativa do Phinx caso o nortedev não consiga mapear o dotenv:
            # vendor/bin/phinx migrate -e production
            
            echo "✅ Deploy Finalizado e Operacional!"
